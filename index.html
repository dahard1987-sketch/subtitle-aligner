<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자막 줄 맞춤 도구</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Noto Sans KR', sans-serif;
  background: linear-gradient(180deg, #f4f7fc 0%, #eef3fb 100%);
  color: #1f2937;
}

.wrap {
  max-width: 1380px;
  margin: 0 auto;
  padding: 28px 24px 36px;
}

.header-card {
  background: rgba(255,255,255,0.85);
  border: 1px solid #dbe3f1;
  border-radius: 22px;
  padding: 28px 28px 24px;
  box-shadow: 0 12px 30px rgba(36, 55, 99, 0.08);
  backdrop-filter: blur(8px);
}

h1 {
  margin: 0 0 8px;
  font-size: 48px;
  line-height: 1.15;
  letter-spacing: -0.02em;
  text-align: center;
}

.desc {
  color: #667085;
  margin: 0 0 20px;
  font-size: 16px;
  text-align: center;
}

.toolbar {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  margin-bottom: 18px;
}

button, .file-label {
  appearance: none;
  border: 1px solid #d8e0ef;
  background: #fff;
  color: #14213d;
  border-radius: 14px;
  padding: 12px 18px;
  cursor: pointer;
  font-family: inherit;
  font-size: 15px;
  font-weight: 700;
  transition: transform .12s ease, box-shadow .12s ease, background .12s ease, border-color .12s ease;
  box-shadow: 0 3px 10px rgba(44, 63, 109, 0.04);
}

button:hover, .file-label:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 20px rgba(44, 63, 109, 0.09);
}

button:active, .file-label:active {
  transform: translateY(0);
}

.primary {
  background: linear-gradient(180deg, #3c82ff 0%, #2f6fed 100%);
  color: white;
  border-color: #2f6fed;
}

.secondary {
  background: #edf3ff;
  color: #2f6fed;
  border-color: #cddcff;
}

.file-label {
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

input[type="file"] {
  display: none;
}

.meta-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-top: 8px;
}

.meta-box {
  background: #f8fbff;
  border: 1px solid #dde6f4;
  border-radius: 14px;
  padding: 12px 14px;
  color: #667085;
  font-size: 14px;
  min-height: 48px;
}

.grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
  gap: 22px;
  margin-top: 22px;
}

.panel {
  min-width: 0;
}

.panel-card {
  background: rgba(255,255,255,0.88);
  border: 1px solid #dbe3f1;
  border-radius: 22px;
  padding: 18px;
  box-shadow: 0 10px 24px rgba(36, 55, 99, 0.06);
}

.panel h3 {
  margin: 0 0 12px;
  font-size: 20px;
}

textarea {
  width: 100%;
  height: 520px;
  border-radius: 16px;
  border: 1px solid #cfd8ea;
  padding: 16px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 18px;
  line-height: 1.65;
  background: #fff;
  color: #111827;
  resize: vertical;
  overflow: auto;
  box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.04);
}

textarea:focus {
  outline: none;
  border-color: #7aa6ff;
  box-shadow: 0 0 0 4px rgba(47, 111, 237, 0.12);
}

textarea.dragover {
  background: #eef5ff;
  border-color: #2f6fed;
  box-shadow: 0 0 0 4px rgba(47, 111, 237, 0.12);
}

.preview-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
  gap: 22px;
  margin-top: 22px;
}

.preview-card {
  background: rgba(255,255,255,0.88);
  border: 1px solid #dbe3f1;
  border-radius: 22px;
  padding: 18px;
  box-shadow: 0 10px 24px rgba(36, 55, 99, 0.06);
}

.preview-card h3 {
  margin: 0 0 12px;
  font-size: 20px;
}

.preview-box {
  height: 420px;
  overflow: auto;
  border: 1px solid #cfd8ea;
  border-radius: 16px;
  background: #fff;
  padding: 0;
}

.preview-line {
  padding: 2px 16px;
  font-size: 18px;
  line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-word;
}

.preview-line.number-line {
  border-top: 3px solid #111827;
  margin-top: 10px;
  padding-top: 12px;
  font-weight: 700;
}

.status {
  margin-top: 22px;
  background: rgba(255,255,255,0.88);
  border: 1px solid #dbe3f1;
  border-radius: 18px;
  padding: 16px 18px;
  color: #475467;
  box-shadow: 0 10px 24px rgba(36, 55, 99, 0.05);
}

.status-title {
  font-weight: 800;
  color: #1d4ed8;
  margin-bottom: 4px;
}

@media (max-width: 980px) {
  .wrap {
    padding: 18px 14px 28px;
  }

  h1 {
    font-size: 34px;
  }

  .grid,
  .preview-grid,
  .meta-row {
    grid-template-columns: 1fr;
  }

  textarea {
    height: 360px;
    font-size: 16px;
  }

  .preview-box {
    height: 300px;
  }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="header-card">
    <h1>자막 줄 맞춤 도구</h1>
    <p class="desc">텍스트 박스에 파일을 직접 드롭하거나 붙여넣을 수 있고, 버튼으로도 영문/한국어 VTT 또는 SRT를 불러올 수 있습니다.</p>

    <div class="toolbar">
      <label class="file-label" for="engFile">영문 자막 열기</label>
      <input id="engFile" type="file" accept=".vtt,.srt,.txt">

      <label class="file-label" for="korFile">한국어 자막 열기</label>
      <input id="korFile" type="file" accept=".vtt,.srt,.txt">

      <button class="primary" onclick="align()">줄 맞추기</button>
      <button class="secondary" onclick="downloadResult()">결과 저장</button>
      <button onclick="copyClean()">한국어 정리 복사</button>
      <button onclick="clearAll()">초기화</button>
    </div>

    <div class="meta-row">
      <div class="meta-box" id="engMeta">영문 파일: 선택 안 됨</div>
      <div class="meta-box" id="korMeta">한국어 파일: 선택 안 됨</div>
    </div>
  </div>

  <div class="grid">
    <div class="panel">
      <div class="panel-card">
        <h3>영문 자막</h3>
        <textarea id="eng" spellcheck="false"></textarea>
      </div>
    </div>
    <div class="panel">
      <div class="panel-card">
        <h3>한국어 자막 / 결과</h3>
        <textarea id="kor" spellcheck="false"></textarea>
      </div>
    </div>
  </div>

  <div class="preview-grid">
    <div class="panel">
      <div class="preview-card">
        <h3>영문 구분선 미리보기</h3>
        <div class="preview-box" id="engPreview"></div>
      </div>
    </div>
    <div class="panel">
      <div class="preview-card">
        <h3>한국어 구분선 미리보기</h3>
        <div class="preview-box" id="korPreview"></div>
      </div>
    </div>
  </div>

  <div class="status">
    <div class="status-title" id="statusTitle">대기 중입니다.</div>
    <div id="statusText">줄 맞춤 후 아래 미리보기에서 번호 위 가로줄을 기준으로 전체 정렬 상태를 확인할 수 있습니다.</div>
  </div>
</div>

<script>
const engBox = document.getElementById('eng');
const korBox = document.getElementById('kor');
const engPreview = document.getElementById('engPreview');
const korPreview = document.getElementById('korPreview');
const engMeta = document.getElementById('engMeta');
const korMeta = document.getElementById('korMeta');
const statusTitle = document.getElementById('statusTitle');
const statusText = document.getElementById('statusText');
const engFile = document.getElementById('engFile');
const korFile = document.getElementById('korFile');
let englishSourceName = '';
let koreanSourceName = '';

function setStatus(title, text, isError = false) {
  statusTitle.textContent = title;
  statusTitle.style.color = isError ? '#b42318' : '#1d4ed8';
  statusText.textContent = text;
}

document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => e.preventDefault());

function readFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result || ''));
    reader.onerror = () => reject(new Error('파일을 읽지 못했습니다.'));
    reader.readAsText(file, 'utf-8');
  });
}

function detectSubtitleFormat(text, fileName = '') {
  const lowerName = fileName.toLowerCase();
  if (lowerName.endsWith('.srt')) return 'srt';
  if (lowerName.endsWith('.vtt')) return 'vtt';

  const lines = normalizeLines(text);
  const firstContentLine = lines.find(line => line.trim() !== '') || '';
  if (firstContentLine.trim().toUpperCase().startsWith('WEBVTT')) return 'vtt';

  const hasSrtStyleTimestamp = lines.some(line =>
    /\d{2}:\d{2}:\d{2},\d{3}\s*-->\s*\d{2}:\d{2}:\d{2},\d{3}/.test(line)
  );
  if (hasSrtStyleTimestamp) return 'srt';

  const hasVttStyleTimestamp = lines.some(line =>
    /\d{2}:\d{2}:\d{2}\.\d{3}\s*-->\s*\d{2}:\d{2}:\d{2}\.\d{3}/.test(line)
  );
  if (hasVttStyleTimestamp) return 'vtt';

  return '';
}

function formatLabel(format) {
  return format ? format.toUpperCase() : '자막';
}

function attachTextareaDrop(el, onLoaded) {
  el.addEventListener('dragover', e => {
    e.preventDefault();
    el.classList.add('dragover');
  });

  el.addEventListener('dragleave', () => {
    el.classList.remove('dragover');
  });

  el.addEventListener('drop', async e => {
    e.preventDefault();
    el.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (!file) return;
    const text = await readFile(file);
    onLoaded(text, file.name);
  });
}

function setEnglishText(text, fileName = null) {
  engBox.value = text;
  if (fileName) englishSourceName = fileName;
  const format = detectSubtitleFormat(text, englishSourceName);
  if (englishSourceName) engMeta.textContent = `영문 파일: ${englishSourceName} (${formatLabel(format)})`;
  renderPreview(engBox, engPreview);
}

function setKoreanText(text, fileName = null) {
  korBox.value = text;
  if (fileName) koreanSourceName = fileName;
  const format = detectSubtitleFormat(text, koreanSourceName);
  if (koreanSourceName) korMeta.textContent = `한국어 파일: ${koreanSourceName} (${formatLabel(format)})`;
  renderPreview(korBox, korPreview);
}

attachTextareaDrop(engBox, (text, fileName) => {
  setEnglishText(text, fileName);
  setStatus('영문 파일을 불러왔습니다.', `${formatLabel(detectSubtitleFormat(text, fileName))} 형식 영문 자막을 직접 드롭하여 불러왔습니다.`);
});

attachTextareaDrop(korBox, (text, fileName) => {
  setKoreanText(text, fileName);
  setStatus('한국어 파일을 불러왔습니다.', `${formatLabel(detectSubtitleFormat(text, fileName))} 형식 한국어 자막을 직접 드롭하여 불러왔습니다.`);
});

engFile.addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  const text = await readFile(file);
  setEnglishText(text, file.name);
  setStatus('영문 파일을 불러왔습니다.', `${formatLabel(detectSubtitleFormat(text, file.name))} 형식 영문 자막을 버튼으로 불러왔습니다.`);
});

korFile.addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  const text = await readFile(file);
  setKoreanText(text, file.name);
  setStatus('한국어 파일을 불러왔습니다.', `${formatLabel(detectSubtitleFormat(text, file.name))} 형식 한국어 자막을 버튼으로 불러왔습니다.`);
});

function escapeHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function renderPreview(sourceBox, previewBox) {
  const lines = sourceBox.value.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  previewBox.innerHTML = lines.map(line => {
    const trimmed = line.trim();
    const cls = /^\d+$/.test(trimmed) ? 'preview-line number-line' : 'preview-line';
    return `<div class="${cls}">${escapeHtml(line) || '&nbsp;'}</div>`;
  }).join('');
}

engBox.addEventListener('input', () => renderPreview(engBox, engPreview));
korBox.addEventListener('input', () => renderPreview(korBox, korPreview));

let syncingTextareas = false;
engBox.addEventListener('scroll', () => {
  if (syncingTextareas) return;
  syncingTextareas = true;
  korBox.scrollTop = engBox.scrollTop;
  syncingTextareas = false;
});
korBox.addEventListener('scroll', () => {
  if (syncingTextareas) return;
  syncingTextareas = true;
  engBox.scrollTop = korBox.scrollTop;
  syncingTextareas = false;
});

let syncingPreview = false;
engPreview.addEventListener('scroll', () => {
  if (syncingPreview) return;
  syncingPreview = true;
  korPreview.scrollTop = engPreview.scrollTop;
  syncingPreview = false;
});
korPreview.addEventListener('scroll', () => {
  if (syncingPreview) return;
  syncingPreview = true;
  engPreview.scrollTop = korPreview.scrollTop;
  syncingPreview = false;
});

function normalizeLines(text) {
  return text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
}

function getNumberPositions(lines) {
  const positions = {};
  lines.forEach((line, idx) => {
    const trimmed = line.trim();
    if (/^\d+$/.test(trimmed)) positions[trimmed] = idx;
  });
  return positions;
}

function mergeBeforeNumber(lines, index) {
  let i = index - 1;
  const textLineIndices = [];

  while (i >= 0) {
    const trimmed = lines[i].trim();
    if (trimmed.includes('-->')) break;
    if (trimmed !== '') textLineIndices.push(i);
    i -= 1;
  }

  if (textLineIndices.length < 2) return lines;

  const first = textLineIndices[1];
  const second = textLineIndices[0];
  lines[first] = `${lines[first]} ${lines[second]}`;
  lines.splice(second, 1);
  return lines;
}

function align() {
  try {
    const eng = normalizeLines(engBox.value);
    let kor = normalizeLines(korBox.value);

    if (!engBox.value.trim() || !korBox.value.trim()) {
      throw new Error('영문 자막과 한국어 자막을 모두 준비해 주세요.');
    }

    const engPos = getNumberPositions(eng);
    const subtitleNumbers = Object.keys(engPos);
    let inserted = 0;
    let merged = 0;

    for (const key of subtitleNumbers) {
      const korPos = getNumberPositions(kor);
      if (!(key in korPos)) continue;

      const target = engPos[key];
      let current = korPos[key];

      while (current < target) {
        kor.splice(current, 0, '');
        current += 1;
        inserted += 1;
      }

      while (current > target) {
        kor = mergeBeforeNumber(kor, current);
        current -= 1;
        merged += 1;
      }
    }

    kor = syncTimestamps(eng, kor);
    korBox.value = kor.join('\n');
    renderPreview(korBox, korPreview);
    setStatus('줄 맞춤 완료', `빈 줄 추가 ${inserted}회, 줄 병합 ${merged}회 처리했습니다. 아래 구분선 미리보기에서 번호 위 가로줄을 기준으로 정렬 상태를 확인하세요.`);
  } catch (error) {
    setStatus('오류', error.message || '처리 중 오류가 발생했습니다.', true);
  }
}

function cleanKoreanText(text) {
  const lines = normalizeLines(text);
  const result = [];
  let currentNum = 1;
  let i = 0;

  while (i < lines.length) {
    if (/^\d+$/.test(lines[i].trim())) {
      result.push(String(currentNum++));
      i += 1;
      while (i < lines.length && !/^\d+$/.test(lines[i].trim())) {
        result.push(lines[i]);
        i += 1;
      }
    } else {
      i += 1;
    }
  }

  return result.join('\n');
}

function copyClean() {
  let lines = korBox.value.split('\n');

  // WEBVTT 제거
  if (lines[0].trim().toUpperCase().includes("WEBVTT")) {
    lines.shift();
  }

  // 빈 줄 제거 (위쪽)
  while (lines.length && lines[0].trim() === '') {
    lines.shift();
  }

  // KOREAN 추가
  lines.unshift("KOREAN");

  const result = lines.join('\n');

  navigator.clipboard.writeText(result);
  alert("복사 완료 (KOREAN 포함)");
}

function downloadResult() {
  const resultFormat =
    detectSubtitleFormat(korBox.value, koreanSourceName) ||
    detectSubtitleFormat(engBox.value, englishSourceName) ||
    'vtt';
  const blob = new Blob([korBox.value], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `korean_aligned.${resultFormat}`;
  a.click();
  URL.revokeObjectURL(a.href);
  setStatus('저장 완료', `${resultFormat.toUpperCase()} 결과 파일을 브라우저 다운로드로 저장했습니다.`);
}

function clearAll() {
  engBox.value = '';
  korBox.value = '';
  engPreview.innerHTML = '';
  korPreview.innerHTML = '';
  engMeta.textContent = '영문 파일: 선택 안 됨';
  korMeta.textContent = '한국어 파일: 선택 안 됨';
  englishSourceName = '';
  koreanSourceName = '';
  engFile.value = '';
  korFile.value = '';
  setStatus('초기화 완료', '입력과 미리보기를 모두 비웠습니다.');
}

function syncTimestamps(engLines, korLines) {
  const isTimestamp = (line) => /\d{2}:\d{2}:\d{2}[.,]\d{3}\s*-->\s*\d{2}:\d{2}:\d{2}[.,]\d{3}/.test(line);

  for (let i = 0; i < engLines.length; i++) {
    if (isTimestamp(engLines[i]) && isTimestamp(korLines[i])) {
      // 영문 포맷 그대로 복사
      korLines[i] = engLines[i];
    }
  }
  return korLines;
}
  
renderPreview(engBox, engPreview);
renderPreview(korBox, korPreview);
</script>
</body>
</html>
